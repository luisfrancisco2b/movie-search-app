<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevFlix - Buscador de Filmes</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>

<body>
    <!-- 1 - header -->
    <header>
        <h1>Dev Flix</h1>

        <div class="container-search">
            <input type="text" id="input-search" placeholder="Pesquisar nome de um filme..." required>
            <button id="button-search">Buscar</button>
        </div>
    </header>
    <!-- 1 - header -->

    <!-- 2 - main -->
    <main>
        <div id="container-films" class="grid-films">
            <p id="message-status" class="hidden-message-status"></p>
        </div>
    </main>
    <!-- 2 - main -->
</body>

</html>
